<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="app-header">
    <span class="app-title">Workout Tracker</span>
    <span class="app-date" id="appDate"></span>
  </header>

  <!-- Calendar -->
  <div class="panel">
    <div class="cal-header">
      <button class="cal-nav" id="calPrev">&#8249;</button>
      <span class="cal-month" id="calMonth"></span>
      <button class="cal-nav" id="calNext">&#8250;</button>
    </div>
    <div class="cal-dow">
      <span>Su</span><span>Mo</span><span>Tu</span>
      <span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-days" id="calDays"></div>
    </div>
    <div class="streak-bar">
      <div>
        <div class="streak-count" id="streakCount">0</div>
        <div class="streak-label">day streak</div>
      </div>
      <div class="streak-sessions">
        <div id="streakSessions">0 sessions</div>
        <div id="streakMonthLabel"></div>
      </div>
    </div>
  </div>

  <!-- Quick log -->
  <div class="section-label">Quick log today</div>
  <div class="quick-btns">
    <button class="qbtn" data-type="upper">
      <div class="qdot" style="background:var(--c-upper)"></div><span>Upper</span>
    </button>
    <button class="qbtn" data-type="lower">
      <div class="qdot" style="background:var(--c-lower)"></div><span>Lower</span>
    </button>
    <button class="qbtn" data-type="climb">
      <div class="qdot" style="background:var(--c-climb)"></div><span>Climb</span>
    </button>
    <button class="qbtn" data-type="cardio">
      <div class="qdot" style="background:var(--c-cardio)"></div><span>Cardio</span>
    </button>
    <button class="qbtn" data-type="yoga">
      <div class="qdot" style="background:var(--c-yoga)"></div><span>Yoga</span>
    </button>
    <button class="qbtn" data-type="walk">
      <div class="qdot" style="background:var(--c-walk)"></div><span>Walk/Other</span>
    </button>
  </div>

  <div class="divider"></div>

  <!-- Timer -->
  <div class="panel">
    <div class="section-label" style="margin-bottom:8px">Rest timer</div>
    <div class="timer-display" id="timerDisplay">01:00</div>
    <div class="timer-presets">
      <button class="preset-btn active" data-secs="60">60s</button>
      <button class="preset-btn" data-secs="90">90s</button>
      <div class="timer-custom">
        <input type="number" id="customTime" min="1" max="600" placeholder="—"/>
        <span>sec</span>
      </div>
    </div>
    <div class="timer-controls">
      <button class="ctrl-btn start" id="startPauseBtn">Start</button>
      <button class="ctrl-btn" id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Workout cards -->
  <div class="section-label" style="margin-bottom:10px">Workouts</div>
  <div class="workout-grid" id="workoutGrid"></div>
  <div class="workout-open" id="workoutOpen"></div>

  <!-- Day picker modal -->
  <div class="dp-modal" id="dayPickerModal" style="display:none"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
